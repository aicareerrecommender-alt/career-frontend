<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CareerPath AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { background: white; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 2.5rem; }
    </style><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<link rel="apple-touch-icon" href="icon-192.png">

</head>
<body>

    <div class="auth-card text-center">
        <div class="mb-4">
            <div class="text-primary mb-3"><i class="fas fa-user-graduate fa-3x"></i></div>
            <h3 class="fw-bold text-dark" id="authTitle">Student Portal</h3>
            <p class="text-muted small">Sign in to your AI Career Dashboard</p>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="form-floating mb-3 text-start">
                <input type="text" id="loginUsername" class="form-control" placeholder="Username" required>
                <label>Username (First Name)</label>
            </div>

            <div class="form-floating mb-3 text-start" id="emailDiv" style="display: none;">
                <input type="email" id="loginEmail" class="form-control" placeholder="name@example.com">
                <label>Email Address</label>
            </div>

            <div class="form-floating mb-3 text-start position-relative">
                <input type="password" id="loginPassword" class="form-control pe-5" placeholder="Password" required>
                <label>Password</label>
                <i class="fas fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted" id="eyeIcon1" style="cursor: pointer; z-index: 10;" onclick="togglePassword('loginPassword', 'eyeIcon1')"></i>
            </div>

            <div class="form-floating mb-3 text-start position-relative" id="confirmPasswordDiv" style="display: none;">
                <input type="password" id="loginConfirmPassword" class="form-control pe-5" placeholder="Confirm Password">
                <label>Confirm Password</label>
                <i class="fas fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted" id="eyeIcon2" style="cursor: pointer; z-index: 10;" onclick="togglePassword('loginConfirmPassword', 'eyeIcon2')"></i>
            </div>

            <div class="text-end mb-2" id="forgotPasswordDiv">
                <a href="#" class="text-muted small text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
            </div>

            <p id="loginMessage" class="text-danger small fw-bold mt-2"></p>

            <button type="submit" id="authBtn" class="btn btn-primary w-100 fw-bold py-3 mt-2 rounded-3 shadow-sm">
                Sign In
            </button>
        </form>

        <p class="mt-4 text-muted small text-center mb-0">
            <span id="authToggleText">New student?</span>
            <a href="#" class="text-primary fw-bold text-decoration-none" id="authToggleLink" onclick="toggleAuthMode(event)">Register here</a>
        </p>
    </div>

    <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small">Enter your registered email and we'll send you a temporary password.</p>
                    <input type="email" id="resetEmail" class="form-control mb-3" placeholder="name@example.com">
                    <button type="button" class="btn btn-primary w-100" id="resetBtn" onclick="handleReset()">Send Temporary Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://career-backend-504u.onrender.com"; 
        let isLoginMode = true;

        window.onload = () => {
            if (localStorage.getItem('user_name')) window.location.href = "index.html";
        };

        function toggleAuthMode(event) {
            if (event) event.preventDefault();
            isLoginMode = !isLoginMode;
            
            document.getElementById('authTitle').innerText = isLoginMode ? "Student Portal" : "Create Account";
            
            // Toggle Fields
            document.getElementById('confirmPasswordDiv').style.display = isLoginMode ? "none" : "block";
            document.getElementById('emailDiv').style.display = isLoginMode ? "none" : "block";
            document.getElementById('forgotPasswordDiv').style.display = isLoginMode ? "block" : "none";
            
            // Update Requirements
            document.getElementById('loginConfirmPassword').required = !isLoginMode;
            document.getElementById('loginEmail').required = !isLoginMode;
            
            // Update Text
            document.getElementById('authBtn').innerText = isLoginMode ? "Sign In" : "Register";
            document.getElementById('authToggleText').innerText = isLoginMode ? "New student?" : "Already have an account?";
            document.getElementById('authToggleLink').innerText = isLoginMode ? "Login here" : "Register here";
            document.getElementById('loginMessage').innerText = "";
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.className = "fas fa-eye-slash position-absolute top-50 end-0 translate-middle-y me-3 text-primary";
            } else {
                input.type = "password";
                icon.className = "fas fa-eye position-absolute top-50 end-0 translate-middle-y me-3 text-muted";
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const user = document.getElementById('loginUsername').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            const confirmPass = document.getElementById('loginConfirmPassword').value.trim();
            const email = document.getElementById('loginEmail').value.trim();
            const msg = document.getElementById('loginMessage');
            const btn = document.getElementById('authBtn');

            if (!isLoginMode && pass !== confirmPass) { msg.innerText = "Passwords do not match!"; return; }

            const originalBtnText = isLoginMode ? "Sign In" : "Register";
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processing...';
            msg.className = "text-primary small fw-bold mt-2";
            msg.innerText = "Connecting to server...";

            const endpoint = isLoginMode ? "/login" : "/register";
            const payload = isLoginMode ? { username: user, password: pass } : { username: user, password: pass, email: email };

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                const data = await response.json();

                if (response.ok) {
                    msg.className = "text-success small fw-bold mt-2";
                    msg.innerText = "Success! Redirecting...";
                    localStorage.setItem('user_name', user); 
                    setTimeout(() => { window.location.href = "index.html"; }, 500);
                } else {
                    msg.className = "text-danger small fw-bold mt-2";
                    msg.innerText = data.message || "Authentication failed.";
                }
            } catch (error) {
                msg.className = "text-danger small fw-bold mt-2";
                if (error.name === 'AbortError') {
                    msg.innerText = "Server took too long (5s). Is your Python terminal paused?";
                } else {
                    msg.innerText = "Cannot reach Python server. Is app.py running?";
                }
            } finally {
                btn.disabled = false;
                if(msg.innerText !== "Success! Redirecting...") btn.innerText = originalBtnText;
            }
        }

        async function handleReset() {
            const emailInput = document.getElementById('resetEmail');
            const btn = document.getElementById('resetBtn');
            const email = emailInput.value.trim();
            if (!email) { alert("Please enter an email address"); return; }

            btn.disabled = true;
            btn.innerText = "Sending...";

            try {
                const res = await fetch(`${API_URL}/forgot-password`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });
                const data = await res.json();
                alert(data.message);
                if (res.ok) bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal')).hide();
            } catch (err) {
                alert("Could not connect to the server.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Temporary Password";
                emailInput.value = "";
            }
        }    // --- PWA SERVICE WORKER REGISTRATION ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(registration => {
                console.log('✅ Service Worker registered successfully with scope:', registration.scope);
            })
            .catch(error => {
                console.error('❌ Service Worker registration failed:', error);
            });
    });
}
    </script>

</body>
</html>
