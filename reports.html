<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Reports | CareerPath AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { 
            background-color: #f4f6f9; 
            font-family: 'Inter', sans-serif; 
        }
        
        /* Sidebar Styles (Matching index.html) */
        .sidebar { 
            height: 100vh; 
            background: #1e293b; 
            color: white; 
            position: fixed; 
            width: 280px; 
            z-index: 1000;
        }
        .nav-link { 
            color: rgba(255,255,255,0.7); 
            transition: 0.3s; 
            margin-bottom: 5px; 
            border-radius: 8px; 
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active { 
            color: white; 
            background: rgba(255,255,255,0.1); 
        }
        .main-content { 
            margin-left: 280px; 
            padding: 40px; 
        }

        /* Inbox Styling */
        .inbox-container { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .inbox-header {
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
            font-weight: 600;
            color: #64748b;
            display: flex;
        }
        .inbox-row { 
            display: flex; 
            align-items: center; 
            padding: 16px 20px; 
            border-bottom: 1px solid #f1f5f9; 
            cursor: pointer; 
            transition: background 0.2s;
        }
        .inbox-row:hover { 
            background-color: #f8fafc; 
            box-shadow: inset 4px 0 0 #4f46e5;
        }
        .inbox-row:last-child { border-bottom: none; }
        
        /* Columns */
        .star-col { width: 40px; color: #cbd5e1; }
        .inbox-row:hover .star-col { color: #f59e0b; }
        .course-col { flex: 1; min-width: 0; padding-right: 20px;}
        .level-col { width: 120px; text-align: right; padding-right: 20px; } /* New column for the badge */
        .date-col { width: 100px; text-align: right; color: #64748b; font-size: 0.85rem; font-weight: 500;}
        
        .course-title { font-weight: 600; color: #1e293b; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .course-subtitle { font-size: 0.85rem; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        
        .level-badge { font-size: 0.75rem; padding: 5px 10px; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 20px; }
            .date-col, .level-col { display: none; }
        }
    </style><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e293b">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<div id="main-app">
    <div class="sidebar d-flex flex-column p-4 shadow-lg">
        <h4 class="fw-bold mb-4 text-white"><i class="fas fa-brain me-2 text-info"></i>CareerPath AI</h4>
        
        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <i class="fas fa-home me-3"></i>Dashboard Home
                </a>
            </li>
            <li class="nav-item mt-2">
                <a href="#" class="nav-link active d-flex justify-content-between align-items-center">
                    <span><i class="fas fa-folder-open me-3"></i>Saved Reports</span>
                    <span class="badge bg-info rounded-pill text-dark" id="reportCountBadge">0</span>
                </a>
            </li>
        </ul>

        <div class="mt-4 pt-3 border-top border-secondary text-center text-secondary small">
            Logged in as: <strong id="sidebar-user" class="text-light"></strong>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark"><i class="fas fa-inbox text-primary me-2"></i>Intelligence Archive</h2>
                <p class="text-secondary">Review your previously generated career recommendations.</p>
            </div>
            <a href="index.html" class="btn btn-primary shadow-sm px-4 rounded-3">
                <i class="fas fa-plus me-2"></i> New Analysis
            </a>
        </div>

        <div class="inbox-container shadow-sm" id="inboxList">
            <div class="inbox-header">
                <div class="star-col"></div>
                <div class="course-col">Report Details</div>
                <div class="level-col">Academic Tier</div>
                <div class="date-col">Date</div>
            </div>
            
            <div class="p-5 text-center text-muted" id="loadingState">
                <div class="spinner-border text-primary mb-3" role="status"></div>
                <p>Fetching your reports...</p>
            </div>
            
            <div id="reportsContainer"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="reportViewModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header bg-light border-0 pb-3 d-flex justify-content-between align-items-center">
                <h5 class="modal-title fw-bold text-dark" id="reportModalLabel"><i class="fas fa-file-alt text-primary me-2"></i> Report Summary</h5>
                <div class="d-flex align-items-center">
                    <button type="button" class="btn btn-dark btn-sm me-3 shadow-sm px-3 rounded-3" onclick="downloadSavedPDF()">
                        <i class="fas fa-file-pdf text-danger me-1"></i> Download PDF
                    </button>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
            </div>
            <div class="modal-body p-4" id="modalContent">
                </div>
            <div class="modal-footer border-0 bg-light">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close Archive</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://career-backend-504u.onrender.com";
    let currentUser = "";
    let globalReports = []; 
    let currentViewedReport = null; // Track which report is open for PDF generation

    window.onload = () => {
        const savedUser = localStorage.getItem('user_name');
        if (!savedUser) {
            window.location.href = "login.html"; 
            return;
        }
        currentUser = savedUser;
        document.getElementById("sidebar-user").innerText = currentUser;
        fetchHistory();
    };

    async function fetchHistory() {
        try {
            const response = await fetch(`${API_URL}/history?username=${encodeURIComponent(currentUser)}`);
            const data = await response.json();
            
            globalReports = data.reverse(); 
            document.getElementById('reportCountBadge').innerText = globalReports.length;
            
            renderInbox(globalReports);
        } catch (error) {
            console.error("Error fetching history:", error);
            document.getElementById('loadingState').innerHTML = `
                <div class="text-danger"><i class="fas fa-exclamation-triangle fa-2x mb-3"></i><br>Failed to load reports. Please ensure backend is running.</div>
            `;
        }
    }

    function renderInbox(reports) {
        document.getElementById('loadingState').style.display = 'none';
        const container = document.getElementById('reportsContainer');
        
        if (!reports || reports.length === 0) {
            container.innerHTML = `
                <div class="p-5 text-center text-muted">
                    <i class="fas fa-folder-open fa-3x mb-3 opacity-50"></i>
                    <h5>Your archive is empty</h5>
                    <p>Run a new analysis to see your saved reports here.</p>
                </div>
            `;
            return;
        }

        container.innerHTML = reports.map((item, index) => {
            const dateStr = item.timestamp ? new Date(item.timestamp).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : 'Unknown Date';
            // Handle structure whether it's wrapped in ai_response or flat
            const aiResults = item.ai_response || item;
            const courseName = aiResults.specific_course || aiResults.course || 'Career Recommendation';
            const level = aiResults.level || 'Degree';
            const role = aiResults.ai_role || 'General Path';
            const uniCount = aiResults.universities ? aiResults.universities.length : 0;

            return `
                <div class="inbox-row" onclick="viewReport(${index})">
                    <div class="star-col"><i class="far fa-star"></i></div>
                    <div class="course-col">
                        <div class="course-title">${courseName}</div>
                        <div class="course-subtitle">
                            Target Role: <strong>${role}</strong> • Matches ${uniCount} Universities
                        </div>
                    </div>
                    <div class="level-col">
                        <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill level-badge">${level}</span>
                    </div>
                    <div class="date-col">${dateStr}</div>
                </div>
            `;
        }).join('');
    }

    function viewReport(index) {
        currentViewedReport = globalReports[index];
        const data = currentViewedReport.ai_response || currentViewedReport;
        
        const modal = new bootstrap.Modal(document.getElementById('reportViewModal'));
        
        let roadmapHtml = data.ai_roadmap 
            ? data.ai_roadmap.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>') 
            : "No specific action plan saved.";

        let uniHtml = "";
        if (data.universities && data.universities.length > 0) {
            uniHtml = `<h6 class="fw-bold mt-4"><i class="fas fa-university me-2 text-primary"></i>Top Institutional Matches:</h6><ul class="list-group mb-3">`;
            data.universities.slice(0, 3).forEach(u => {
                uniHtml += `<li class="list-group-item bg-light border-0 mb-1 rounded"><strong>${u.name}</strong><br><small class="text-muted">${u.reason}</small></li>`;
            });
            uniHtml += `</ul>`;
        }

        document.getElementById('modalContent').innerHTML = `
            <div class="mb-3">
                <span class="badge bg-warning text-dark mb-2 px-3 py-2 rounded-pill"><i class="fas fa-star me-1"></i> SAVED MATCH</span>
                <h3 class="fw-bold text-dark mb-1">${data.specific_course || data.course}</h3>
                <h6 class="text-secondary">Target Role: ${data.ai_role}</h6>
            </div>
            <hr class="text-muted my-4">
            <h6 class="fw-bold text-dark mb-3"><i class="fas fa-map-signs text-primary me-2"></i> AI Action Plan</h6>
            <div class="bg-white p-4 rounded-3 border shadow-sm text-secondary" style="line-height: 1.8; font-size: 0.95rem;">
                ${roadmapHtml}
            </div>
            ${uniHtml}
        `;
        
        modal.show();
    }

    // --- PDF GENERATION ENGINE FOR SAVED REPORTS ---
    function buildPDFDocument(aiResults, fullLogItem) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const studentName = currentUser || "Student";
        // Extract points from the root log item or the ai_results
        const aggPoints = fullLogItem.points || aiResults.validated_points || "Retrieved from Archive";

        doc.setFillColor(79, 70, 229); 
        doc.rect(0, 0, 210, 40, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(22);
        doc.text("KUCCPS Smart Placement Report", 14, 25);
        doc.setFontSize(10);
        
        const dateText = fullLogItem.timestamp ? new Date(fullLogItem.timestamp).toLocaleDateString() : new Date().toLocaleDateString();
        doc.text(`Archive Date: ${dateText}`, 150, 25);

        doc.setTextColor(0, 0, 0);
        doc.setFontSize(12);
        doc.text(`Name: ${studentName}`, 14, 50);
        doc.text(`Aggregate Points: ${aggPoints}`, 14, 57);

        let currentY = 70; 
        doc.setFillColor(240, 245, 255);
        doc.rect(14, currentY, 182, 30, 'F');
        doc.setFontSize(14);
        doc.setTextColor(0, 51, 102);
        const mainPath = aiResults.specific_course || aiResults.course || aiResults.career_path || aiResults.ai_role;
        doc.text(`Recommended Path: ${mainPath} (${aiResults.level || "Degree"})`, 18, currentY + 12);
        doc.setFontSize(12);
        doc.text(`Target Role: ${aiResults.ai_role}`, 18, currentY + 22);
        currentY += 40;

        if (aiResults.ai_roadmap) {
            doc.setFontSize(13);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold");
            doc.text("Your Action Plan:", 14, currentY);
            let cleanRoadmap = aiResults.ai_roadmap.replace(/<br\s*[\/]?>/gi, "\n").replace(/<li>/gi, "\n • ").replace(/<\/li>/gi, "").replace(/<[^>]*>?/gm, "").replace(/&nbsp;/g, " ").trim();
            doc.setFontSize(11);
            doc.setTextColor(60, 60, 60);
            doc.setFont("helvetica", "normal");
            const splitRoadmap = doc.splitTextToSize(cleanRoadmap, 182);
            doc.text(splitRoadmap, 14, currentY + 8);
            currentY += 15 + (splitRoadmap.length * 5); 
        }

        if (aiResults.universities && aiResults.universities.length > 0) {
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold"); 
            doc.text("Verified Institutional Pathways:", 14, currentY);
            doc.setFont("helvetica", "normal"); 
            const tableData = aiResults.universities.map(u => {
                const reqSummary = u.requirements_met ? u.requirements_met.map(r => `${r.subject}: ${r.attained} (Req: ${r.required})`).join("\n") : "Standard Entry Met";
                return [u.name, u.specific_course || u.course || u.course_name || "Recommended Degree", reqSummary, u.reason];
            });
            doc.autoTable({ startY: currentY + 5, head: [['Institution', 'Verified Course', 'Requirement Check', 'Reason']], body: tableData, theme: 'grid', headStyles: { fillColor: [79, 70, 229] }, columnStyles: { 0: { cellWidth: 40 }, 2: { cellWidth: 40 } }, styles: { fontSize: 8, cellPadding: 3 } });
        }

        let finalY = doc.lastAutoTable ? doc.lastAutoTable.finalY + 15 : currentY + 20;
        if (finalY > 250) { doc.addPage(); finalY = 20; }

        if (aiResults.alternative_careers && aiResults.alternative_careers.length > 0) {
            doc.setFontSize(12);
            doc.setTextColor(0, 0, 0);
            doc.setFont("helvetica", "bold");
            doc.text("Alternative Career Pathways:", 14, finalY);
            doc.setFont("helvetica", "normal");
            const altTableData = aiResults.alternative_careers.map(alt => [alt.name, alt.reason]);
            doc.autoTable({ startY: finalY + 5, head: [['Backup Career', 'Why this is a good fit']], body: altTableData, theme: 'grid', headStyles: { fillColor: [255, 193, 7], textColor: [0, 0, 0] }, styles: { fontSize: 9, cellPadding: 4 } });
        }
        return doc;
    }

    function downloadSavedPDF() {
        if (!currentViewedReport) { alert("Error loading report data."); return; }
        const aiResults = currentViewedReport.ai_response || currentViewedReport;
        
        // Change button text briefly to show action
        const btn = document.querySelector('button[onclick="downloadSavedPDF()"]');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Generating...`;
        
        setTimeout(() => {
            const doc = buildPDFDocument(aiResults, currentViewedReport);
            const studentName = currentUser || "Student";
            const fileName = `${studentName.replace(/\s+/g, '_')}_Saved_Placement_Report.pdf`;
            doc.save(fileName);
            btn.innerHTML = originalHtml;
        }, 300);
    }// --- PWA SERVICE WORKER REGISTRATION ---
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(registration => {
                console.log('✅ Service Worker registered successfully with scope:', registration.scope);
            })
            .catch(error => {
                console.error('❌ Service Worker registration failed:', error);
            });
    });
}
</script>

</body>
</html>
